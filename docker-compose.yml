version: "3.8"

services:
  postgres_v2:
    image: postgres:15-alpine
    container_name: pqrs_v2_db
    environment:
      POSTGRES_USER: pqrs_admin
      POSTGRES_PASSWORD: pg_password
      POSTGRES_DB: pqrs_v2
    ports:
      - "5434:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pqrs_admin -d pqrs_v2"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis_v2:
    image: redis:7-alpine
    container_name: pqrs_v2_redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning --requirepass NuSvuOWiQtGWkZleg-zwqUZzs6DewuaK

  zookeeper_v2:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: pqrs_v2_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2182:2181"

  kafka_v2:
    image: confluentinc/cp-kafka:7.3.0
    container_name: pqrs_v2_kafka
    depends_on:
      - zookeeper_v2
    ports:
      - "9093:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper_v2:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka_v2:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  minio_v2:
    image: minio/minio
    container_name: pqrs_v2_minio
    hostname: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: adminminio
      MINIO_ROOT_PASSWORD: adminpassword
      MINIO_ACCESS_KEY: adminminio
      MINIO_SECRET_KEY: adminpassword
    ports:
      - "9020:9000"
      - "9021:9001"
    volumes:
      - minio_v2_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend_v2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pqrs_v2_backend
    environment:
      - DATABASE_URL=postgresql://pqrs_admin:pg_password@postgres_v2:5432/pqrs_v2
      - REDIS_URL=redis://redis_v2:6379
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - KAFKA_BOOTSTRAP_SERVERS=kafka_v2:29092
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=adminminio
      - MINIO_SECRET_KEY=adminpassword
      - MINIO_PUBLIC_URL=http://54.233.39.211:9020
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    ports:
      - "8001:8000"
    depends_on:
      - postgres_v2
      - redis_v2
      - kafka_v2

  master_worker_v2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pqrs_v2_master_worker
    command: python master_worker_outlook.py
    environment:
      - WORKER_DB_URL=postgresql://pqrs_admin:pg_password@postgres_v2:5432/pqrs_v2
      - DATABASE_URL=postgresql://pqrs_admin:pg_password@postgres_v2:5432/pqrs_v2
      - REDIS_URL=redis://redis_v2:6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=adminminio
      - MINIO_SECRET_KEY=adminpassword
      - MINIO_PUBLIC_URL=http://54.233.39.211:9020
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      - postgres_v2
      - redis_v2
      - minio_v2
    restart: unless-stopped

  demo_worker_v2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pqrs_v2_demo_worker
    command: python demo_worker.py
    environment:
      - WORKER_DB_URL=postgresql://pqrs_admin:pg_password@postgres_v2:5432/pqrs_v2
      - DATABASE_URL=postgresql://pqrs_admin:pg_password@postgres_v2:5432/pqrs_v2
      - REDIS_URL=redis://redis_v2:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DEMO_GMAIL_USER=democlasificador@gmail.com
      - DEMO_GMAIL_PASSWORD=${DEMO_GMAIL_PASSWORD:-}
      - DEMO_RESET_MINUTES=30
    depends_on:
      - postgres_v2
      - redis_v2
    restart: unless-stopped

  frontend_v2:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pqrs_v2_frontend
    environment:
      - NEXT_PUBLIC_API_URL=https://app.flexpqr.com
    ports:
      - "3002:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend_v2

  nginx_ssl:
    image: nginx:alpine
    container_name: pqrs_v2_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend_v2
      - backend_v2
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  minio_v2_data:
