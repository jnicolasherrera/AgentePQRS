# FlexPQR — Nginx Reverse Proxy
# flexpqr.com → Vercel (redirect if hits VPS)
# app.flexpqr.com → Dashboard + API

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name flexpqr.com www.flexpqr.com app.flexpqr.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Fallback for IP access (existing self-signed cert)
server {
    listen 80 default_server;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Docker internal DNS resolver — re-resolves every 30s
    resolver 127.0.0.11 valid=30s ipv6=off;

    # SSE stream
    location /api/v2/stream/ {
        set $upstream_backend pqrs_v2_backend:8000;
        proxy_pass http://$upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    location /api/ {
        set $upstream_backend pqrs_v2_backend:8000;
        proxy_pass http://$upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    location / {
        set $upstream_frontend pqrs_v2_frontend:3000;
        proxy_pass http://$upstream_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ═══════════════════════════════════════════
# Landing page — flexpqr.com → Vercel
# If DNS still routes here, redirect to Vercel
# ═══════════════════════════════════════════
server {
    listen 443 ssl;
    server_name flexpqr.com www.flexpqr.com;

    ssl_certificate     /etc/nginx/certs/flexpqr.crt;
    ssl_certificate_key /etc/nginx/certs/flexpqr.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    return 301 https://flexpqr.com$request_uri;
}

# ═══════════════════════════════════════════
# Dashboard app — app.flexpqr.com
# ═══════════════════════════════════════════
server {
    listen 443 ssl;
    server_name app.flexpqr.com;

    ssl_certificate     /etc/nginx/certs/app.flexpqr.crt;
    ssl_certificate_key /etc/nginx/certs/app.flexpqr.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Docker internal DNS resolver — re-resolves every 30s
    resolver 127.0.0.11 valid=30s ipv6=off;

    # SSE stream
    location /api/v2/stream/ {
        set $upstream_backend pqrs_v2_backend:8000;
        proxy_pass http://$upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # Backend API
    location /api/ {
        set $upstream_backend pqrs_v2_backend:8000;
        proxy_pass http://$upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    # Frontend dashboard
    location / {
        set $upstream_frontend pqrs_v2_frontend:3000;
        proxy_pass http://$upstream_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
